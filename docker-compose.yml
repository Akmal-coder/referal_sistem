services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: referral
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d referral"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: referral
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data:
